<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Uni Assist — Study Smarter, Not Harder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if(window['pdfjsLib']){
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  }
</script>
<style>
  :root{
    --sidebar-bg:#122A1D;
    --sidebar-bg-2:#0D2216;
    --sidebar-line:rgba(255,255,255,.08);
    --accent:#3C8B4A;
    --accent-dark:#2C6B39;
    --accent-light:#DFEFE1;
    --gold:#E7B84E;
    --bg:#F0F1EC;
    --card:#FFFFFF;
    --border:#E3E4DF;
    --text:#181C19;
    --text-muted:#68706A;
    --danger:#C0392B;
    --radius:16px;
    --radius-sm:10px;
    --shadow: 0 1px 2px rgba(20,30,20,.06), 0 6px 20px rgba(20,30,20,.06);
    font-size:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
  }
  h1,h2,h3,h4{margin:0; font-family:'Georgia','Times New Roman',serif; letter-spacing:-0.01em;}
  p{margin:0;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit; font-size:.95rem;}
  a{color:inherit;}
  ::selection{background:var(--gold); color:#1a1a1a;}

  :focus-visible{
    outline:3px solid var(--gold);
    outline-offset:2px;
    border-radius:6px;
  }

  /* ---------- automatic TV layout (large screens, 10-foot UI) ---------- */
  @media (min-width:1600px){
    body{font-size:19px;}
    .app-frame{max-width:1760px; margin:0 auto; padding:26px 30px;}
    .sidebar{width:290px; padding:34px 22px;}
    .main{padding:10px 30px 60px;}
    .nav-item{padding:14px 16px; font-size:1rem;}
    .card{padding:28px;}
    .mat-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));}
    :focus-visible{outline-width:4px; outline-offset:4px;}
    .btn{padding:14px 22px; font-size:1rem;}
  }

  /* ---------- app frame / shell ---------- */
  .app-frame{min-height:100vh;}
  .shell{display:flex; min-height:100vh;}
  .main{flex:1; min-width:0; padding:28px 32px 90px; max-width:1400px;}
  .page-head{margin-bottom:22px;}
  .page-head .eyebrow{color:var(--text-muted); font-size:.78rem; letter-spacing:.08em; text-transform:uppercase; font-weight:600;}
  .page-head h1{font-size:1.9rem; margin-top:4px;}

  /* ---------- sidebar ---------- */
  .sidebar{
    width:250px; flex-shrink:0; background:linear-gradient(180deg,var(--sidebar-bg),var(--sidebar-bg-2));
    color:#EAF3EA; padding:26px 18px; display:flex; flex-direction:column; gap:26px;
    position:sticky; top:0; height:100vh; overflow-y:auto;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .cap{font-size:1.7rem;}
  .brand-text{font-family:'Georgia',serif; font-weight:700; font-size:1.15rem; letter-spacing:.03em;}
  .user-badge{background:rgba(255,255,255,.06); border:1px solid var(--sidebar-line); border-radius:var(--radius-sm); padding:12px 14px;}
  .user-badge .name{font-weight:700; font-size:1.02rem;}
  .user-badge .meta{color:#B9CCB9; font-size:.82rem; margin-top:2px;}
  .nav-group{display:flex; flex-direction:column; gap:2px;}
  .nav-label{color:#8FAE8F; font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; font-weight:700; margin:6px 4px 6px;}
  .nav-item{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px;
    color:#D7E6D6; text-decoration:none; font-size:.92rem; font-weight:500; border:none; background:transparent; width:100%; text-align:left;
  }
  .nav-item .ic{width:26px; height:26px; border-radius:7px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.08); font-size:14px; flex-shrink:0;}
  .nav-item:hover{background:rgba(255,255,255,.06);}
  .nav-item.active{background:var(--accent); color:#fff;}
  .nav-item.active .ic{background:rgba(255,255,255,.22);}
  .sidebar-foot{margin-top:auto; display:flex; flex-direction:column; gap:4px;}

  /* ---------- bottom nav (phone) ---------- */
  .bottom-nav{
    display:none; position:fixed; bottom:0; left:0; right:0; z-index:200;
    background:var(--sidebar-bg); border-top:1px solid var(--sidebar-line);
    padding:8px 4px calc(8px + env(safe-area-inset-bottom));
    justify-content:space-around;
  }
  .bottom-nav button{
    background:none; border:none; color:#B9CCB9; display:flex; flex-direction:column; align-items:center; gap:2px; font-size:.58rem; font-weight:600; padding:4px 3px; border-radius:10px; flex:1; min-width:0;
  }
  .bottom-nav button .ic{font-size:17px;}
  .bottom-nav button.active{color:#fff;}
  .bottom-nav button.active .ic{color:var(--gold);}

  /* ---------- generic cards / ui ---------- */
  .card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:22px;}
  .card h3{font-size:1.05rem; margin-bottom:14px;}
  .grid{display:grid; gap:16px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:2fr 1fr;}
  @media (max-width:1180px){ .grid-4{grid-template-columns:repeat(2,1fr);} .grid-2{grid-template-columns:1fr;} }
  @media (max-width:640px){ .grid-4{grid-template-columns:1fr 1fr;} .grid-3{grid-template-columns:1fr 1fr;} }

  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; border-radius:10px; padding:11px 18px; font-weight:600; font-size:.92rem;}
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-primary:hover{background:var(--accent-dark);}
  .btn-ghost{background:var(--accent-light); color:var(--accent-dark);}
  .btn-outline{background:transparent; border:1px solid var(--border); color:var(--text);}
  .btn-block{width:100%;}
  .btn-sm{padding:7px 12px; font-size:.8rem; border-radius:8px;}
  .btn-danger{background:#FBE4E1; color:var(--danger);}

  label{display:block; font-size:.8rem; font-weight:700; color:#3a423c; margin:12px 0 6px;}
  label:first-of-type{margin-top:0;}
  input[type=text],input[type=email],input[type=password],input[type=datetime-local],input[type=date],input[type=number],select,textarea{
    width:100%; padding:11px 13px; border-radius:10px; border:1px solid var(--border); background:#F6F7F4; color:var(--text); font-size:.9rem;
  }
  textarea{resize:vertical; min-height:80px;}
  input:focus,select:focus,textarea:focus{background:#fff; border-color:var(--accent);}
  .field-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media (max-width:640px){.field-row{grid-template-columns:1fr;}}

  .pill{display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:999px; font-size:.78rem; font-weight:600;}
  .pill-green{background:var(--accent-light); color:var(--accent-dark);}
  .pill-gold{background:#FBF0D6; color:#8A6A15;}
  .pill-outline{background:#fff; border:1px solid var(--border); color:var(--text-muted);}

  .empty-state{border:1.5px dashed var(--border); border-radius:var(--radius-sm); padding:26px 16px; text-align:center; color:var(--text-muted); font-size:.88rem;}
  .empty-state .big{font-size:1.6rem; display:block; margin-bottom:6px;}

  .tabs{display:flex; gap:6px; background:#EAEBE6; padding:4px; border-radius:11px; width:fit-content;}
  .tabs button{background:transparent; border:none; padding:9px 18px; border-radius:8px; font-weight:600; font-size:.86rem; color:var(--text-muted);}
  .tabs button.active{background:#fff; color:var(--text); box-shadow:0 1px 2px rgba(0,0,0,.08);}

  /* ---------- auth ---------- */
  .auth-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; background:radial-gradient(circle at 30% 20%, #17331f 0%, #0c1c12 65%);}
  .auth-card{background:#fff; border-radius:20px; padding:38px 34px; width:100%; max-width:430px; box-shadow:0 30px 70px rgba(0,0,0,.4);}
  .auth-logo{display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:6px;}
  .auth-logo .cap{font-size:1.8rem;}
  .auth-logo h2{font-size:1.4rem;}
  .auth-tagline{text-align:center; color:var(--text-muted); font-size:.88rem; margin:8px 0 22px; line-height:1.4;}
  .auth-tabs{display:flex; gap:6px; background:#EDEEE9; padding:4px; border-radius:11px; margin-bottom:20px;}
  .auth-tabs button{flex:1; background:transparent; border:none; padding:10px; border-radius:8px; font-weight:700; font-size:.86rem; color:var(--text-muted);}
  .auth-tabs button.active{background:var(--accent); color:#fff;}
  .auth-error{background:#FBE4E1; color:var(--danger); padding:9px 12px; border-radius:8px; font-size:.82rem; margin-bottom:12px;}
  .auth-demo{text-align:center; margin-top:14px; font-size:.8rem; color:var(--text-muted);}
  .auth-demo button{background:none;border:none;color:var(--accent-dark);font-weight:700;text-decoration:underline;}

  /* ---------- dashboard ---------- */
  .welcome-banner{background:linear-gradient(120deg,var(--sidebar-bg),#1c4028); color:#fff; border-radius:var(--radius); padding:24px 26px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;}
  .welcome-banner h2{font-size:1.25rem; font-weight:700; font-family:inherit;}
  .welcome-banner p{color:#CFE3CF; font-size:.85rem; margin-top:4px;}
  .stat-card{display:flex; flex-direction:column; gap:6px;}
  .stat-card .num{font-size:1.9rem; font-weight:800; font-family:Georgia,serif; color:var(--accent-dark);}
  .stat-card .lbl{font-size:.78rem; color:var(--text-muted); font-weight:600;}
  .section-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}

  /* ---------- materials ---------- */
  .dropzone{border:2px dashed #BBD6BE; border-radius:var(--radius-sm); background:var(--accent-light); padding:26px; text-align:center; margin-bottom:16px;}
  .dropzone .big{font-size:1.8rem;}
  .dropzone p{font-size:.85rem; color:var(--accent-dark); margin:6px 0 12px;}
  .mat-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:14px;}
  .mat-card{border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; background:#fff;}
  .mat-thumb{height:80px; display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff; font-size:1.3rem; letter-spacing:.03em;}
  .mat-body{padding:11px 12px;}
  .mat-title{font-weight:700; font-size:.85rem; line-height:1.25;}
  .mat-meta{font-size:.72rem; color:var(--text-muted); margin-top:4px;}
  .mat-foot{display:flex; align-items:center; justify-content:space-between; margin-top:8px;}
  .mat-size{font-size:.7rem; color:var(--text-muted);}

  /* ---------- AI Study ---------- */
  .ai-layout{display:grid; grid-template-columns:320px 1fr; gap:18px; align-items:start;}
  @media (max-width:960px){.ai-layout{grid-template-columns:1fr;}}
  .quick-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px;}
  .quick-btn{background:#F6F7F4; border:1px solid var(--border); border-radius:10px; padding:12px 8px; text-align:center; font-size:.78rem; font-weight:700; color:var(--text);}
  .quick-btn:hover{border-color:var(--accent); color:var(--accent-dark);}
  .quick-btn .ic{display:block; font-size:1.2rem; margin-bottom:4px;}
  .chat-panel{display:flex; flex-direction:column; height:min(640px,72vh); background:var(--sidebar-bg); border-radius:var(--radius); overflow:hidden;}
  .chat-sessions-bar{display:flex; gap:6px; overflow-x:auto; padding:8px 12px; background:#0f2417; border-bottom:1px solid var(--sidebar-line); flex-shrink:0;}
  .session-pill{flex-shrink:0; display:flex; align-items:center; gap:6px; background:rgba(255,255,255,.08); color:#D7E6D6; border:none; padding:6px 8px 6px 12px; border-radius:999px; font-size:.72rem; font-weight:600; white-space:nowrap;}
  .session-pill span.title{max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer;}
  .session-pill button.del{background:none; border:none; color:inherit; opacity:.65; font-size:12px; line-height:1; padding:2px 4px; cursor:pointer;}
  .session-pill button.del:hover{opacity:1;}
  .session-pill.active{background:var(--accent); color:#fff;}
  .session-pill.new{background:var(--gold); color:#3a2a05; display:flex; align-items:center; gap:4px;}
  .chat-head{padding:16px 18px; color:#fff; border-bottom:1px solid var(--sidebar-line); display:flex; align-items:center; gap:10px;}
  .chat-messages{flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px; background:#F3F5F1;}
  .msg{max-width:80%; padding:11px 14px; border-radius:14px; font-size:.88rem; line-height:1.5; white-space:pre-wrap;}
  .msg-assistant{background:#fff; border:1px solid var(--border); align-self:flex-start; border-bottom-left-radius:4px;}
  .msg-user{background:var(--accent); color:#fff; align-self:flex-end; border-bottom-right-radius:4px;}
  .msg-loading{align-self:flex-start; color:var(--text-muted); font-size:.82rem; font-style:italic;}
  .chat-input-row{display:flex; gap:8px; padding:12px; background:#fff; border-top:1px solid var(--border);}
  .chat-input-row textarea{flex:1; min-height:44px; max-height:120px; border-radius:12px;}
  .chat-input-row button{width:46px; height:46px; border-radius:12px; background:var(--accent); color:#fff; border:none; font-size:16px; flex-shrink:0;}

  /* ---------- schedule ---------- */
  .rem-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px;}
  .rem-card{border-radius:12px; padding:13px 14px; border:1px solid var(--border);}
  .rem-day{font-weight:800; font-size:.72rem; letter-spacing:.06em; text-transform:uppercase;}
  .rem-title{font-weight:700; font-size:.86rem; margin:5px 0 6px;}
  .rem-time{font-size:.76rem; color:var(--text-muted);}
  .cat-legend{display:flex; flex-direction:column; gap:8px; margin-top:10px;}
  .cat-legend .row{display:flex; align-items:center; gap:8px; font-size:.82rem;}
  .cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .mini-cal{width:100%; border-collapse:collapse; font-size:.78rem; margin-top:10px;}
  .mini-cal th{color:var(--text-muted); font-weight:700; padding:4px 0; font-size:.68rem;}
  .mini-cal td{text-align:center; padding:6px 0; border-radius:8px;}
  .mini-cal td.today{background:var(--accent); color:#fff; font-weight:800;}
  .mini-cal td.muted{color:#c7cbc2;}

  /* ---------- goals ---------- */
  .goal-row{border:1px solid var(--border); border-radius:12px; padding:13px 15px; margin-bottom:10px;}
  .goal-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:10px;}
  .goal-name{font-weight:700; font-size:.9rem;}
  .goal-cat{font-size:.72rem; color:var(--text-muted);}
  .progress-track{height:9px; background:#E9EAE4; border-radius:999px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--accent); border-radius:999px; transition:width .3s;}
  .range-label{display:flex; justify-content:space-between; font-size:.78rem; color:var(--text-muted); margin-top:6px;}
  input[type=range]{width:100%; accent-color:var(--accent);}

  /* ---------- profile ---------- */
  .profile-head{display:flex; align-items:center; gap:18px; flex-wrap:wrap;}
  .avatar-lg{width:78px; height:78px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--sidebar-bg)); color:#fff; display:flex; align-items:center; justify-content:center; font-size:1.7rem; font-weight:800; flex-shrink:0; position:relative;}
  .avatar-badge{position:absolute; bottom:-2px; right:-2px; width:26px; height:26px; border-radius:50%; background:#fff; border:2px solid var(--card); display:flex; align-items:center; justify-content:center; font-size:12px;}
  .profile-tags{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;}
  .completeness{margin-top:14px;}
  .completeness .track{height:7px; background:#E9EAE4; border-radius:999px; overflow:hidden; margin-top:6px;}
  .completeness .fill{height:100%; background:var(--gold);}

  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#173420; color:#fff; padding:12px 20px; border-radius:10px; font-size:.85rem; box-shadow:var(--shadow); z-index:900;}

  /* ---------- responsive breakpoints ---------- */
  @media (max-width:900px){
    .sidebar{width:78px; padding:22px 10px; align-items:center;}
    .brand-text,.user-badge .meta,.user-badge .name,.nav-label,.nav-item span.label,.sidebar-foot span.label{display:none;}
    .user-badge{padding:8px; display:flex; justify-content:center;}
    .nav-item{justify-content:center; padding:12px;}
    .main{padding:24px 18px 90px;}
  }
  @media (max-width:640px){
    .sidebar{display:none;}
    .bottom-nav{display:flex;}
    .main{padding:18px 14px 90px;}
    .welcome-banner{flex-direction:column; align-items:flex-start;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
/* ============================= DATA ============================= */
const UNIVERSITIES = [
  "University of Nigeria, Nsukka","Covenant University","University of Benin","Osun State University",
  "Delta State University","Afe Babalola University","University of Lagos","Obafemi Awolowo University",
  "University of Ibadan","Ahmadu Bello University","University of Port Harcourt","Lagos State University",
  "Federal University of Technology, Akure","Federal University of Technology, Minna","University of Ilorin",
  "Nnamdi Azikiwe University","Ladoke Akintola University of Technology","Bayero University Kano",
  "University of Calabar","Ekiti State University","Babcock University","Bowen University",
  "Redeemer's University","Landmark University","Bells University of Technology","Pan-Atlantic University",
  "Federal University of Agriculture, Abeokuta","Rivers State University","Imo State University",
  "Enugu State University of Science and Technology","Abia State University","Benue State University",
  "Kaduna State University","Kano University of Science and Technology","University of Jos",
  "University of Uyo","University of Abuja","Federal University, Oye-Ekiti","Chukwuemeka Odumegwu Ojukwu University",
  "Michael Okpara University of Agriculture","Nasarawa State University","Modibbo Adama University"
].sort((a,b)=>a.localeCompare(b));
const DEPARTMENTS = [
  "Business Administration","Computer Engineering","Computer Science","Law","Radiography","Anatomy",
  "Mechanical Engineering","Electrical Engineering","Civil Engineering","Chemical Engineering","Petroleum Engineering",
  "Accounting","Banking and Finance","Economics","Political Science","Mass Communication","Public Administration",
  "Sociology","Psychology","English Language","History and International Studies","Philosophy","Theatre Arts",
  "Medicine and Surgery","Nursing Science","Pharmacy","Physiology","Medical Laboratory Science","Public Health",
  "Biochemistry","Microbiology","Botany","Zoology","Physics","Chemistry","Mathematics","Statistics",
  "Agricultural Science","Architecture","Estate Management","Urban and Regional Planning","Surveying and Geoinformatics",
  "Food Science and Technology","Human Nutrition and Dietetics","Marketing","Insurance","Actuarial Science",
  "Library and Information Science","Guidance and Counselling","Educational Administration","Fine and Applied Arts",
  "Music","Linguistics","Religious Studies","Criminology and Security Studies","International Relations"
].sort((a,b)=>a.localeCompare(b));
const LEVELS = ["100 Level","200 Level","300 Level","400 Level","500 Level","600 Level"];
const DEPT_SHORT = {"Business Administration":"Bus Admin","Computer Engineering":"Comp Eng","Law":"Law","Radiography":"Radiography","Anatomy":"Anatomy","Mechanical Engineering":"Mech Eng"};
const LEVEL_SHORT = {"100 Level":"100lv","200 Level":"200lv","300 Level":"300lv","400 Level":"400lv","500 Level":"500lv","600 Level":"600lv"};

const REMINDER_CATS = {
  "Study Session": {bg:"#DCEBFB", fg:"#1D5FA6", dot:"#2E7BD6", ic:"📘"},
  "Assignment Due": {bg:"#FCEEDC", fg:"#B4650C", dot:"#E08A2E", ic:"📝"},
  "Exam/Test": {bg:"#FBE0DD", fg:"#B23223", dot:"#D9463A", ic:"📄"},
  "General Reminder": {bg:"#E1F0E3", fg:"#2E6E3A", dot:"#3C8B4A", ic:"🔔"},
  "Class/Lecture": {bg:"#EBE1FA", fg:"#6438A6", dot:"#8B5FBF", ic:"🎓"},
  "Group Work": {bg:"#E7E7E7", fg:"#3A3A3A", dot:"#3A3A3A", ic:"👥"}
};
const GOAL_CATS = ["Exam Prep","Personal Development","Academics","Career","Skill Building"];
const THUMB_COLORS = ["#2E6E3A","#1D4ED8","#B45309","#7C3AED","#DC2626","#0F766E","#BE185D","#334155"];

function hashColor(str){ let h=0; for(let i=0;i<str.length;i++) h=(h+str.charCodeAt(i)*7)%THUMB_COLORS.length; return THUMB_COLORS[h]; }
function initialsOf(str){ const w=str.trim().split(/\s+/); return (w[0]?.[0]||"?").toUpperCase()+(w[1]?.[0]||"").toUpperCase(); }
function uid(){ return Math.random().toString(36).slice(2,10); }

/* Password input with a show/hide toggle */
function passwordField(name, placeholder, extra=""){
  return `<div style="position:relative;">
    <input type="password" name="${name}" placeholder="${placeholder}" ${extra} style="padding-right:42px;">
    <button type="button" onclick="togglePwd(this)" aria-label="Show or hide password" style="position:absolute; right:4px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); font-size:15px; padding:8px;">👁</button>
  </div>`;
}
function togglePwd(btn){
  const input = btn.previousElementSibling;
  if(input.type === "password"){ input.type = "text"; btn.textContent = "🙈"; }
  else { input.type = "password"; btn.textContent = "👁"; }
}

/* Type-or-pick field: a normal native dropdown (correct position, arrow,
   opens like any other select) with an "Other" option that reveals a text
   box for anything not on the list. */
function comboField(name, options, placeholder, currentValue=""){
  const isOther = currentValue && !options.includes(currentValue);
  const uidStr = uid();
  const selId = `sel_${name}_${uidStr}`;
  const inputId = `inp_${name}_${uidStr}`;
  return `<select id="${selId}" onchange="syncComboField('${selId}','${inputId}')">
    <option value="" ${currentValue?'':'selected'} disabled>${placeholder}</option>
    ${options.map(o=>`<option value="${o.replace(/"/g,'&quot;')}" ${o===currentValue?'selected':''}>${o}</option>`).join('')}
    <option value="__other__" ${isOther?'selected':''}>Other (type your own)</option>
  </select>
  <input type="text" name="${name}" id="${inputId}" placeholder="Type it here" value="${(isOther?currentValue:'').replace(/"/g,'&quot;')}" style="display:${isOther?'block':'none'}; margin-top:8px;">`;
}
function syncComboField(selId, inputId){
  const sel = document.getElementById(selId);
  const input = document.getElementById(inputId);
  if(sel.value === "__other__"){
    input.style.display = "block";
    input.value = "";
    input.focus();
  } else {
    input.style.display = "none";
    input.value = sel.value;
  }
}

/* ============================= PERSISTENCE ============================= */
/* Saves to this browser's local storage so accounts/materials/reminders/goals
   survive a refresh — without this, everything lived only in memory and any
   account created was lost the moment the page reloaded. */
const STORAGE_KEY = "uniassist_app_data_v1";
function saveData(){
  try{
    const stripFile = m => { const {fileBlob, ...rest} = m; return rest; };
    const stripMsg = m => { const {apiParts, ...rest} = m; return rest; };
    const usersLight = users.map(u => ({
      ...u,
      materials: (u.materials||[]).map(stripFile),
      chatSessions: (u.chatSessions||[]).map(s => ({...s, messages:(s.messages||[]).map(stripMsg)}))
    }));
    const communityLight = communityPosts.map(stripFile);
    localStorage.setItem(STORAGE_KEY, JSON.stringify({users:usersLight, communityPosts:communityLight}));
  }catch(e){
    showToast("⚠️ Your browser storage is full — try removing older items.");
  }
}
function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const parsed = JSON.parse(raw);
    if(Array.isArray(parsed.users) && parsed.users.length){
      users.length = 0;
      users.push(...parsed.users);
    }
    if(Array.isArray(parsed.communityPosts)){
      communityPosts.length = 0;
      communityPosts.push(...parsed.communityPosts);
    }
  }catch(e){ /* corrupted/blocked storage — fall back to defaults */ }
}

/* ============================= AI CHAT SESSIONS ============================= */
/* Each user keeps a list of past AI Study conversations, like Claude's chat
   history — you can start a new one and switch back to an old one any time. */
function ensureChatSessions(u){
  if(!Array.isArray(u.chatSessions)) u.chatSessions = [];
  return u.chatSessions;
}
function getActiveSession(u){
  const sessions = ensureChatSessions(u);
  let session = sessions.find(s=>s.id===state.activeSessionId);
  if(!session){
    session = sessions.length ? sessions[sessions.length-1] : createChatSession(u, false);
    state.activeSessionId = session.id;
  }
  return session;
}
function createChatSession(u, doRender=true){
  const sessions = ensureChatSessions(u);
  const session = {id:uid(), title:"New chat", messages:[], updatedAt:Date.now()};
  sessions.push(session);
  state.activeSessionId = session.id;
  if(doRender){ saveData(); render(); }
  return session;
}
function startNewChat(){
  const u = currentUser();
  createChatSession(u);
}
function switchChatSession(id){
  state.activeSessionId = id;
  render();
}
function deleteChatSession(id){
  const u = currentUser();
  const sessions = ensureChatSessions(u);
  const target = sessions.find(s=>s.id===id);
  if(!target) return;
  if(!confirm(`Delete "${target.title}"? This can't be undone.`)) return;
  const idx = sessions.findIndex(s=>s.id===id);
  sessions.splice(idx,1);
  if(state.activeSessionId === id){
    state.activeSessionId = sessions.length ? sessions[sessions.length-1].id : null;
  }
  saveData();
  render();
}

function handleSignIn(e){
  e.preventDefault();

  const email = f.get("email").trim().toLowerCase();

  const u = users.find(u=>u.email.toLowerCase()===email);
  if(!u || u.password!==pass){

    render();
    return false;
  }
  state.authError="";
  state.currentUserId = u.id;
  state.view="app";
  state.activePage="dashboard";
  render();
  return false;
}

function handleSignUp(e){
  e.preventDefault();
  const f = new FormData(e.target);
  const name=f.get("name").trim(), email=f.get("email").trim(), pass=f.get("password");
  const university=f.get("university"), department=f.get("department"), level=f.get("level");
  if(!name||!email||!pass||!university||!department||!level){
    state.authError="Please fill in every field to create your account.";
    render(); return false;
  }
  if(users.some(u=>u.email.toLowerCase()===email.toLowerCase())){
    state.authError="An account with that email already exists.";
    render(); return false;
  }
  const u = {id:uid(), name, email, password:pass, university, department, level, materials:[], reminders:[], goals:[]};
  users.push(u);
  saveData();
  state.authError="";
  state.currentUserId=u.id;
  state.view="app";
  state.activePage="dashboard";
  render();
  return false;
}

/* index of every material by id so a download button can find its file
   data even though the same material appears in multiple lists */
const materialsIndex = {};
function indexMaterial(m){ materialsIndex[m.id] = m; }
function reindexAllMaterials(){
  users.forEach(u => (u.materials||[]).forEach(indexMaterial));
  communityPosts.forEach(indexMaterial);
}

/* File bytes are stored in IndexedDB, not localStorage — localStorage has a
   tiny quota (a few MB) and silently fails once exceeded, which is exactly
   what was making downloads say "no file attached" after a reload. IndexedDB
   has a much larger quota and is meant for this. */
const FILE_DB_NAME = "uniassist_files_v1";
const FILE_STORE = "files";
function openFileDB(){
  return new Promise((resolve,reject)=>{
    if(!window.indexedDB){ reject(new Error("IndexedDB unavailable")); return; }
    const req = indexedDB.open(FILE_DB_NAME, 1);
    req.onupgradeneeded = () => { req.result.createObjectStore(FILE_STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function saveFileBlob(id, blob){
  try{
    const db = await openFileDB();
    return await new Promise((resolve,reject)=>{
      const tx = db.transaction(FILE_STORE, "readwrite");
      tx.objectStore(FILE_STORE).put(blob, id);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }catch(e){ return false; }
}
async function loadFileBlob(id){
  try{
    const db = await openFileDB();
    return await new Promise((resolve,reject)=>{
      const tx = db.transaction(FILE_STORE, "readonly");
      const req = tx.objectStore(FILE_STORE).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }catch(e){ return null; }
}

function downloadMaterial(id){
  const m = materialsIndex[id];
  if(!m){ showToast("Couldn't find that material."); return; }
  const finishDownload = (blob) => {
    if(!blob){ showToast("No file is attached to this item yet."); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = m.fileName || `${m.title.replace(/[^\w\- ]/g,"")}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
    showToast(`Downloading ${m.fileName || m.title}…`);
    const u = currentUser();
    if(u){
      if(!Array.isArray(u.downloadedIds)) u.downloadedIds = [];
      if(!u.downloadedIds.includes(id)){
        u.downloadedIds.push(id);
        saveData();
        render();
      }
    }
  };
  if(m.fileBlob){ finishDownload(m.fileBlob); return; }
  // not in memory (e.g. loaded from a previous session) — check IndexedDB
  loadFileBlob(id).then(finishDownload);
}

const MAX_MATERIAL_BYTES = 500 * 1024 * 1024; // 500MB — IndexedDB can hold it; actual mobile browser quota may vary (see note to user)
function handlePostMaterial(e){
  e.preventDefault();
  const f = new FormData(e.target);
  const u = currentUser();
  const title=f.get("title"), course=f.get("course"), weeks=f.get("weeks"), level=f.get("level");
  const fileInputEl = document.getElementById('fileInput');
  const file = fileInputEl && fileInputEl.files[0];

  function finish(blob, fileMime, fileName, sizeLabel){
    const mat = {id:uid(), title, course, weeks, level, size:sizeLabel, fileMime, fileName, fileBlob: blob};
    u.materials.push(mat);
    const communityCopy = {...mat, university:u.university, department:u.department, owner:u.name};
    communityPosts.push(communityCopy);
    indexMaterial(mat);
    indexMaterial(communityCopy);
    if(blob) saveFileBlob(mat.id, blob); // persisted separately in IndexedDB — survives reloads
    saveData();
    showToast("Material posted! It's now in your Library and visible to your department & level — and can be downloaded.");
    e.target.reset();
    if(document.getElementById('fileNameLabel')) document.getElementById('fileNameLabel').innerText = "No file selected";
    render();
  }

  if(file && file.size > MAX_MATERIAL_BYTES){
    showToast(`That file is too large (max ${(MAX_MATERIAL_BYTES/1024/1024).toFixed(0)}MB) — please choose a smaller file, or remove it to post details only.`);
    return false;
  }

  if(file){
    // File objects are already Blobs — store directly, no base64 conversion needed
    const sizeKB = Math.max(1, Math.round(file.size/1024));
    const sizeLabel = sizeKB>1024 ? (sizeKB/1024).toFixed(1)+"MB" : sizeKB+"KB";
    finish(file, file.type, file.name, sizeLabel);
  } else {
    const placeholderText = `This is a placeholder file for "${title}" (${course}).\nNo document was attached when this was posted.`;
    const blob = new Blob([placeholderText], {type:"text/plain"});
    finish(blob, "text/plain", `${title.replace(/[^\w\- ]/g,"")}.txt`, "1KB");
  }
  return false;
}

/* ============================= DOCUMENT IMPORT ============================= */
// Files sent as raw binary (images) still have to fit in the proxy's request —
// keep that cap tight. PDFs get their TEXT extracted right here in the browser
// first, so only the (much smaller) text goes over the network — a 50MB
// text-based lecture PDF might only be a few hundred KB of actual text.
const MAX_BINARY_DOC_BYTES = 3 * 1024 * 1024;      // images / non-PDF binary files
const MAX_PDF_SOURCE_BYTES = 100 * 1024 * 1024;    // the PDF itself, before extraction (just needs to fit in the browser's memory)
const MAX_EXTRACTED_CHARS = 300000;                 // ~120-150 pages of dense text — plenty for lecture notes, keeps the request small

function isTextFile(file){ return file.type === "text/plain" || /\.(txt|md)$/i.test(file.name); }
function isPdfFile(file){ return file.type === "application/pdf" || /\.pdf$/i.test(file.name); }
function isSupportedDoc(file){
  const ok = ["application/pdf","image/png","image/jpeg","image/webp","text/plain"];
  return ok.includes(file.type) || isTextFile(file) || isPdfFile(file);
}

async function extractPdfText(file){
  if(!window['pdfjsLib']) throw new Error("PDF reader didn't load — check your connection and try again.");
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  let text = "";
  const pageCount = pdf.numPages;
  for(let i=1; i<=pageCount; i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(" ") + "\n\n";
    if(text.length > MAX_EXTRACTED_CHARS) break;
  }
  return { text: text.trim(), pageCount };
}

async function handleDocumentImport(inputEl){
  const files = Array.from(inputEl.files || []);
  if(!files.length) return;
  if(!Array.isArray(state.pendingDocuments)) state.pendingDocuments = [];

  const imageBytesUsed = () => state.pendingDocuments
    .filter(d => d.kind === "file")
    .reduce((sum,d) => sum + (d.approxBytes||0), 0);

  for(const file of files){
    if(!isSupportedDoc(file)){
      showToast(`"${file.name}" isn't a supported type — skipped.`);
      continue;
    }

    if(isPdfFile(file)){
      if(file.size > MAX_PDF_SOURCE_BYTES){
        showToast(`"${file.name}" is too large to process (max ${(MAX_PDF_SOURCE_BYTES/1024/1024).toFixed(0)}MB) — skipped.`);
        continue;
      }
      try{
        const { text, pageCount } = await extractPdfText(file);
        if(text.length < 30){
          showToast(`"${file.name}" looks like a scanned/image-only PDF (no readable text) — skipped. Try exporting a page as an image instead.`);
          continue;
        }
        const truncated = text.length >= MAX_EXTRACTED_CHARS;
        state.pendingDocuments.push({ name:file.name, kind:"text", text: truncated ? text.slice(0, MAX_EXTRACTED_CHARS) : text });
        showToast(truncated ? `"${file.name}" imported (${pageCount} pages — using the first part, it was long).` : `"${file.name}" imported (${pageCount} pages of text).`);
      }catch(err){
        showToast(`Couldn't read "${file.name}" (${err.message}) — skipped.`);
      }
      continue;
    }

    if(isTextFile(file)){
      try{
        const text = await file.text();
        state.pendingDocuments.push({ name:file.name, kind:"text", text });
        showToast(`"${file.name}" imported.`);
      }catch(err){
        showToast(`Couldn't read "${file.name}" — skipped.`);
      }
      continue;
    }

    // image / other binary — shares one combined budget across everything attached right now
    if(imageBytesUsed() + file.size > MAX_BINARY_DOC_BYTES){
      showToast(`"${file.name}" would push your attached images over the ${(MAX_BINARY_DOC_BYTES/1024/1024).toFixed(0)}MB combined limit — skipped. Remove another image first, or attach fewer.`);
      continue;
    }
    try{
      const dataUrl = await new Promise((resolve,reject)=>{
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result));
        reader.onerror = () => reject(new Error("read failed"));
        reader.readAsDataURL(file);
      });
      const base64 = dataUrl.split(",")[1] || "";
      state.pendingDocuments.push({ name:file.name, kind:"file", mimeType: file.type || "application/octet-stream", data: base64, approxBytes: file.size });
      showToast(`"${file.name}" imported.`);
    }catch(err){
      showToast(`Couldn't read "${file.name}" — skipped.`);
    }
  }

  inputEl.value = "";
  render();
}
function removePendingDocument(index){
  if(Array.isArray(state.pendingDocuments)) state.pendingDocuments.splice(index, 1);
  render();
}

/* ============================= SHARED AI ENDPOINT (optional) ============================= */
/* If you deploy the small proxy function in uni-assist-ai-proxy.js (see the
   backend plan doc) and put its URL here, EVERY user of this app shares one
   key automatically — nobody has to connect their own. Leave blank to keep
   the current "each person connects their own free Gemini key" behavior. */
const SHARED_AI_ENDPOINT = "https://uni-assist-proxy.vercel.app/api/ai";

async function callGemini(model, system, contents){
  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-goog-api-key": state.aiApiKey
    },
    body: JSON.stringify({
      system_instruction: { parts:[{ text: system }] },
      contents
    })
  });
  if(!resp.ok){
    const errBody = await resp.json().catch(()=>({}));
    const err = new Error(errBody?.error?.message || `Request failed (${resp.status})`);
    err.status = resp.status;
    throw err;
  }
  const data = await resp.json();
  return (data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||"").join("\n").trim();
}

async function callSharedEndpoint(system, contents){
  const resp = await fetch(SHARED_AI_ENDPOINT, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ system, contents })
  });
  if(resp.status === 413){
    throw new Error("That document is too large for the shared AI connection to carry (limit ~3MB). Try a smaller file, or a text-only excerpt.");
  }
  const data = await resp.json().catch(()=>({}));
  if(!resp.ok) throw new Error(data.error || `Request failed (${resp.status})`);
  return (data.text || "").trim();
}

/* Google's free-tier Flash model occasionally returns a "high demand" / overloaded
   error at peak times. Retry once with a short delay, then fall back to the
   lighter Flash-Lite model before giving up. */
async function askGemini(system, contents){
  if(SHARED_AI_ENDPOINT){
    const text = await callSharedEndpoint(system, contents);
    return text || "Sorry, I couldn't generate a response — please try again.";
  }
  const models = ["gemini-flash-latest","gemini-flash-lite-latest"];
  let lastErr;
  for(const model of models){
    for(let attempt=0; attempt<2; attempt++){
      try{
        const text = await callGemini(model, system, contents);
        return text || "Sorry, I couldn't generate a response — please try again.";
      }catch(err){
        lastErr = err;
        const overloaded = /overload|high demand|503/i.test(err.message) || err.status===503;
        if(overloaded && attempt===0){
          await new Promise(r=>setTimeout(r, 1300));
          continue;
        }
        break;
      }
    }
  }
  throw lastErr;
}


async function submitChat(){
  const input = document.getElementById('chatInput');
  const notes = document.getElementById('notesArea');
  let question = input.value.trim();
  if(!question) return;
  if(!SHARED_AI_ENDPOINT && !state.aiApiKey){
    state.showKeyPanel = true;
    showToast("Connect your API key first — see the panel on the left.");
    render();
    return;
  }
  const rawQuestion = question;
  let apiContent = question;
  let displayContent = question;
  const apiParts = [];
  const docs = state.pendingDocuments || [];
  if(notes && notes.value.trim()){
    apiContent = `Here are my lecture notes:\n\n${notes.value.trim()}\n\n${apiContent}`;
    displayContent = `📝 (pasted notes)\n${displayContent}`;
    notes.value = "";
  }
  if(docs.length){
    const names = [];
    for(const doc of docs){
      names.push(doc.name);
      if(doc.kind === "text"){
        apiContent = `Here is the content of "${doc.name}":\n\n${doc.text}\n\n${apiContent}`;
      } else {
        apiParts.push({ inline_data: { mime_type: doc.mimeType, data: doc.data } });
      }
    }
    displayContent = `📎 ${names.join(', ')}\n${displayContent}`;
    state.pendingDocuments = [];
  }
  input.value = "";
  const u = currentUser();
  const session = getActiveSession(u);
  const isFirstMessage = session.messages.filter(m=>m.role==='user').length === 0;
  session.messages.push({role:"user", content:displayContent, apiContent, apiParts});
  if(isFirstMessage){
    session.title = rawQuestion.length > 40 ? rawQuestion.slice(0,40)+"…" : rawQuestion;
  }
  session.updatedAt = Date.now();
  state.chatLoading = true;
  render();
  scrollChatBottom();
  try{
    const system = `You are the Uni Assist AI Study Assistant, helping a Nigerian university student named ${u.name}, studying ${u.department} (${u.level}) at ${u.university}. Give clear, direct, exam-ready study help. Write in plain text only — do not use markdown formatting of any kind: no asterisks for bold or italics, no pound/hash symbols for headings, no slashes for alternatives, no markdown tables. For lists, use simple numbered lines like "1. ..." on their own line, or short plain sentences — never bullet symbols or asterisks. Keep answers focused, practical, and easy to read as plain chat text. When a document is attached, base your answer on its actual content.`;
    const lastIdx = session.messages.length - 1;
    const contents = session.messages.map((m, idx) => {
      const parts = [{ text: m.apiContent !== undefined ? m.apiContent : m.content }];
      if(m.apiParts && m.apiParts.length && idx === lastIdx) parts.push(...m.apiParts); // only resend attachments on the turn they were added, not every turn after
      return { role: m.role === "assistant" ? "model" : "user", parts };
    });
    const reply = await askGemini(system, contents);
    session.messages.push({role:"assistant", content:reply});
  }catch(err){
    session.messages.push({role:"assistant", content:`I couldn't reach the AI service: ${err.message}. Double-check your API key and try again.`});
  }
  session.updatedAt = Date.now();
  saveData();
  state.chatLoading = false;
  render();
  scrollChatBottom();
}
function scrollChatBottom(){
  requestAnimationFrame(()=>{
    const el = document.getElementById('chatMessages');
    if(el) el.scrollTop = el.scrollHeight;
  });
}
function exportChat(){
  const u = currentUser();
  const session = getActiveSession(u);
  if(session.messages.length===0){ showToast("Nothing to export yet — ask a question first."); return; }
  const lines = [
    "UNI ASSIST — AI STUDY NOTES",
    `Chat: ${session.title}`,
    `Student: ${u.name} · ${u.department} · ${u.level} · ${u.university}`,
    `Exported: ${new Date().toLocaleString()}`,
    "".padEnd(40,"—"),
    ""
  ];
  session.messages.forEach(m=>{
    lines.push(m.role==="user" ? "YOU ASKED:" : "UNI ASSIST AI:");
    lines.push(m.content);
    lines.push("");
  });
  const blob = new Blob([lines.join("\n")], {type:"text/plain;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `uni-assist-notes-${Date.now()}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("Notes exported to your downloads.");
}

    <button onclick="deleteReminder('${r.id}')" title="Delete reminder" aria-label="Delete reminder" style="position:absolute; top:8px; right:8px; background:rgba(0,0,0,.08); border:none; width:20px; height:20px; border-radius:50%; font-size:11px; color:${cat.fg}; line-height:1;">✕</button>
    <div class="rem-day" style="color:${cat.fg}; display:flex; align-items:center; gap:6px; padding-right:22px;"><span>${day} · ${date}</span>${overdue?'<span style="background:var(--danger); color:#fff; font-size:.62rem; padding:2px 7px; border-radius:999px; font-weight:800;">OVERDUE</span>':''}</div>
    <div class="rem-title">${r.text}</div>
    <div class="rem-time">${cat.ic} ${time} · ${r.category}</div>
  </div>`;
}
function deleteReminder(id){
  const u = currentUser();
  if(!confirm("Delete this reminder?")) return;
  u.reminders = u.reminders.filter(r=>r.id!==id);
  saveData();
  showToast("Reminder deleted.");
  render();
}

function buildMiniCalendar(){
  const now = new Date();
  const y=now.getFullYear(), m=now.getMonth();
  const first = new Date(y,m,1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const daysInPrev = new Date(y,m,0).getDate();
  let cells=[];
  for(let i=startDow-1;i>=0;i--) cells.push({d:daysInPrev-i, muted:true});
  for(let d=1;d<=daysInMonth;d++) cells.push({d, muted:false, today:d===now.getDate()});
  while(cells.length%7!==0) cells.push({d:cells.length,muted:true});
  let rows=[];
  for(let i=0;i<cells.length;i+=7) rows.push(cells.slice(i,i+7));
  const monthName = now.toLocaleDateString('en-US',{month:'long', year:'numeric'});
  return `<div style="font-weight:700; font-size:.85rem; margin-top:14px;">${monthName}</div>
  <table class="mini-cal"><thead><tr>${['S','M','T','W','T','F','S'].map(d=>`<th>${d}</th>`).join('')}</tr></thead>
  <tbody>${rows.map(row=>`<tr>${row.map(c=>`<td class="${c.muted?'muted':''} ${c.today?'today':''}">${c.d}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}

            </div>
            <label>Initial Progress (<span id="progressLabel">0</span>%)</label>

          </form>
        </div>
      </div>
      <div class="card">
        <h3>Active Goals</h3>
        ${u.goals.length ? u.goals.map(g=>`
          <div class="goal-row">
            <div class="goal-top">
              <div><div class="goal-name">🏆 ${g.title}</div><div class="goal-cat">${g.category}${g.date?` · due ${g.date}`:''}</div></div>
              <div style="display:flex; gap:6px;">
                <button class="btn btn-ghost btn-sm" onclick="bumpGoal('${g.id}')">+10%</button>
                <button class="btn btn-outline btn-sm" onclick="deleteGoal('${g.id}')" title="Delete goal" aria-label="Delete goal">✕</button>
              </div>
            </div>
            <div class="progress-track"><div class="progress-fill" style="width:${g.progress}%;"></div></div>
            <div class="range-label"><span>${g.progress}%</span><span>${g.progress>=100?'Complete 🎉':''}</span></div>
          </div>

    </div>

}
function handleAddGoal(e){
  e.preventDefault();
  const f = new FormData(e.target);
  const u = currentUser();
  u.goals.push({id:uid(), title:f.get("title"), category:f.get("category"), date:f.get("date"), progress:parseInt(f.get("progress")||"0",10)});
  saveData();
  showToast("Goal added.");
  e.target.reset();
  render();
  return false;
}
function bumpGoal(id){
  const u = currentUser();
  const g = u.goals.find(g=>g.id===id);
  if(g) g.progress = Math.min(100, g.progress+10);
  saveData();
  render();
}
function deleteGoal(id){
  const u = currentUser();
  if(!confirm("Delete this goal?")) return;
  u.goals = u.goals.filter(g=>g.id!==id);
  saveData();
  showToast("Goal deleted.");
  render();
}

/* ============================= PAGE: PROFILE (enhanced UX) ============================= */
function pageProfile(u){
  const filled = [u.name,u.university,u.department,u.level].filter(Boolean).length + (u.avatarData?1:0);
  const completeness = Math.round((filled/5)*100);
  return `
    <div class="page-head"><div class="eyebrow">Account</div><h1>Profile</h1></div>
    <div class="card" style="margin-bottom:20px;">
      <div class="profile-head">
        <div class="avatar-lg" style="${u.avatarData?`background-image:url('${u.avatarData}'); background-size:cover; background-position:center;`:''}">
          ${u.avatarData ? '' : initialsOf(u.name)}
          <input type="file" id="avatarInput" accept="image/png,image/jpeg,image/webp" style="display:none" onchange="handleAvatarSelect(this)">
          <span class="avatar-badge" title="Change photo" onclick="document.getElementById('avatarInput').click()">${ICON.camera}</span>
        </div>
        <div>
          <h2 style="font-size:1.3rem;">${u.name}</h2>
          <div class="profile-tags">
            <span class="pill pill-green">🎓 ${u.department}</span>
            <span class="pill pill-green">📶 ${u.level}</span>
            <span class="pill pill-outline">🏫 ${u.university}</span>
          </div>
        </div>
      </div>
      <div class="completeness">
        <div style="display:flex; justify-content:space-between; font-size:.78rem; color:var(--text-muted);"><span>Profile completeness</span><span>${completeness}%</span></div>
        <div class="track"><div class="fill" style="width:${completeness}%;"></div></div>
      </div>
    </div>

    <div class="grid grid-3" style="margin-bottom:20px;">
      <div class="card stat-card"><span class="num">${u.materials.length}</span><span class="lbl">Materials Shared</span></div>
      <div class="card stat-card"><span class="num">${u.reminders.length}</span><span class="lbl">Reminders Set</span></div>
      <div class="card stat-card"><span class="num">${u.goals.length}</span><span class="lbl">Active Goals</span></div>
    </div>

    <div class="card">
      <div class="tabs" style="margin-bottom:20px;">
        <button class="${state.profileTab==='view'?'active':''}" onclick="setProfileTab('view')">Overview</button>
        <button class="${state.profileTab==='edit'?'active':''}" onclick="setProfileTab('edit')">Edit Profile</button>
        <button class="${state.profileTab==='password'?'active':''}" onclick="setProfileTab('password')">Change Password</button>
      </div>
      ${state.profileTab==='view'?renderProfileOverview(u):''}
      ${state.profileTab==='edit'?renderProfileEdit(u):''}
      ${state.profileTab==='password'?renderProfilePassword(u):''}

    <div class="card" style="margin-top:20px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
      <div>
        <h3 style="font-size:.95rem; margin-bottom:2px;">💬 Have feedback?</h3>
        <p style="font-size:.8rem; color:var(--text-muted);">Report a bug or share an idea — takes a minute.</p>
      </div>

    </div>
  `;
}
function setProfileTab(tab){ state.profileTab=tab; render(); }
function renderProfileOverview(u){
  return `
    <div class="grid grid-2">
      <div>
        <label>Full Name</label><p style="padding:11px 13px; background:#F6F7F4; border-radius:10px;">${u.name}</p>
        <label>Email Address</label><p style="padding:11px 13px; background:#F6F7F4; border-radius:10px;">${u.email}</p>
      </div>
      <div>
        <label>University</label><p style="padding:11px 13px; background:#F6F7F4; border-radius:10px;">${u.university}</p>
        <label>Department / Level</label><p style="padding:11px 13px; background:#F6F7F4; border-radius:10px;">${u.department} · ${u.level}</p>
      </div>
    </div>
    <button class="btn btn-outline" style="margin-top:16px;" onclick="setProfileTab('edit')">${ICON.edit} Edit these details</button>
  `;
}
function renderProfileEdit(u){
  return `
  <form onsubmit="return handleEditProfile(event)">
    <div class="field-row">
      <div><label>Full Name</label><input type="text" name="name" value="${u.name}" required></div>
      <div><label>University</label>${comboField("university", UNIVERSITIES, "Type or pick your University", u.university)}</div>
    </div>
    <div class="field-row">
      <div><label>Department</label>${comboField("department", DEPARTMENTS, "Type or pick your Department", u.department)}</div>
      <div><label>Level</label><select name="level">${LEVELS.map(x=>`<option ${x===u.level?'selected':''}>${x}</option>`).join('')}</select></div>
    </div>
    <button class="btn btn-primary" style="margin-top:16px;" type="submit">${ICON.check} Save Changes</button>
  </form>`;
}
function handleAvatarSelect(inputEl){
  const file = inputEl.files[0];
  if(!file) return;
  if(file.size > 8*1024*1024){
    showToast("That image is too large — please choose one under 8MB.");
    inputEl.value = "";
    return;
  }
  const img = new Image();
  const reader = new FileReader();
  reader.onload = () => {
    img.onload = () => {
      // resize down to a small square so it stays cheap to store/persist
      const size = 240;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size/img.width, size/img.height);
      const w = img.width*scale, h = img.height*scale;
      ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
      const u = currentUser();
      u.avatarData = dataUrl;
      saveData();
      showToast("Profile photo updated.");
      render();
    };
    img.onerror = () => showToast("Couldn't read that image — please try another.");
    img.src = reader.result;
  };
  reader.onerror = () => showToast("Couldn't read that image — please try another.");
  reader.readAsDataURL(file);
  inputEl.value = "";
}

function handleEditProfile(e){
  e.preventDefault();
  const f = new FormData(e.target);
  const u = currentUser();
  u.name=f.get("name"); u.university=f.get("university"); u.department=f.get("department"); u.level=f.get("level");
  saveData();
  showToast("Profile updated.");
  state.profileTab="view";
  render();
  return false;
}
function renderProfilePassword(u){
  return `
  <form onsubmit="return handleChangePassword(event)">
    <label>Old Password</label>${passwordField("old","",  "required")}
    <label>New Password</label>${passwordField("new1","", "required minlength=\"6\"")}
    <label>Confirm New Password</label>${passwordField("new2","", "required minlength=\"6\"")}
    <button class="btn btn-primary" style="margin-top:16px;" type="submit">${ICON.lock} Update Password</button>
  </form>`;
}
function handleChangePassword(e){
  e.preventDefault();
  const f = new FormData(e.target);
  const u = currentUser();
  if(f.get("old")!==u.password){ showToast("Old password is incorrect."); return false; }
  if(f.get("new1")!==f.get("new2")){ showToast("New passwords don't match."); return false; }
  u.password=f.get("new1");
  saveData();
  showToast("Password updated.");
  state.profileTab="view";
  render();
  return false;
}

/* ============================= ROOT RENDER ============================= */
function render(){
  const root = document.getElementById('root');
  root.innerHTML = state.view==='auth' ? renderAuth() : renderApp();
}
render();
</script>
